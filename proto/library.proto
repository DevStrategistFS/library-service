syntax = "proto3";

package library;

service LibraryService {
  rpc CreateBook (BookRequest) returns (BookResponse);
  rpc ListBooks (Empty) returns (BookList);
  rpc BorrowBook (BorrowRequest) returns (ActionResponse);
  rpc ReturnBook (ReturnRequest) returns (ActionResponse);
  rpc CreateMember (MemberRequest) returns (MemberResponse);
}

message Empty {}

message BookRequest {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
}

message BookResponse {
  int32 id = 1;
  string message = 2;
}

message BookList {
  repeated BookRequest books = 1;
}

message BorrowRequest {
  int32 book_id = 1;
  int32 member_id = 2;
}

message ReturnRequest {
  int32 book_id = 1;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

message MemberRequest {
  string name = 1;
  string email = 2;
}

message MemberResponse {
  int32 id = 1;
  string message = 2;
}